"$schema" = "https://starship.rs/config-schema.json"

format = """
[¯éÂ](fg:flamingo)\
$directory\
$username\
$hostname\
$container\
$sudo\
$shlvl\
[¯é╝](fg:flamingo bg:peach)\
$vcsh\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
[¯é╝](fg:peach bg:yellow)\
$cmd_duration\
$status\
[¯é╝](fg:yellow bg:green)\
$deno\
$golang\
$helm\
$lua\
$nodejs\
$php\
$python\
$rust\
[¯é╝](fg:green bg:blue)\
$package\
$nix_shell\
[¯é╝](fg:blue bg:mauve)\
$aws\
$azure\
$docker_context\
$kubernetes\
[¯é┤](fg:mauve)\
$line_break\
$shell\
$character"""

add_newline = true
palette = "catppuccin_mocha"

[directory]
format = "[$path ]($style)[$read_only]($read_only_style)"
style = 'bg:flamingo fg:surface1'
read_only_style = 'bg:red fg:surface1'
read_only = ' ´Çú'
use_os_path_sep = false

[username]
format = '[ $user]($style)'
style_root = 'bg:red fg:surface1'
style_user = 'bg:red fg:surface1'

[hostname]
format = '[$ssh_symbol$hostname ]($style)'
style = 'bg:red fg:surface1'
ssh_symbol = '@'

[container]
format = '[$hostname]($style)'
style = 'bg:red fg:surface1'

[sudo]
disabled = false
format = '[$symbol]($style)'
style = 'bg:red fg:surface1'
symbol = '´É¢ '

[shlvl]
style = 'bg:red fg:surface1'

### VCS
[git_branch]
symbol = '´Éÿ '
format = '[ $symbol$branch]($style)'
style = 'bg:peach fg:surface1'

[hg_branch]
format = '[$symbol$branch]($style)'
style = 'bg:peach fg:surface1'

[git_commit]
format = '[\($hash$tag\)]($style)'
tag_disabled = false
tag_symbol = ' ´Ç½ '
style = 'bg:peach fg:surface1'

[git_state]
format = '[\($state( $progress_current/$progress_total)\)]($style)'
style = 'bg:peach fg:surface1'

[git_metrics]
format = '([ +$added]($added_style)[/](bg:peach fg:surface1)[-$deleted]($deleted_style))'
added_style = 'bg:peach fg:surface1'
deleted_style = 'bg:peach fg:surface1'
disabled = false

[git_status]
format = '([ $all_status$ahead_behind]($style))'
ahead = "Ôåæ"
behind = "Ôåô"
conflicted = "!"
deleted = "├ù"
diverged = "Ôåò"
modified = "~"
renamed = "┬╗"
untracked = "+"
staged = "ÔùÅ"
stashed = "´«à "
style = 'bg:peach fg:surface1'

[cmd_duration]
format = '[´«½ $duration]($style)'
style = 'bg:yellow fg:surface1'
show_milliseconds = false
min_time = 300000

[status]
style = 'bg:yellow fg:surface1'

